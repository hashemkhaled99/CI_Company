name: 'Sijil Go Linter (golangci-lint)'
description: 'Runs golangci-lint for Go code.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
    - name: Download Go modules (for module-aware linting)
      run: |
        cd trying || exit 0
        if [ -f go.mod ]; then go mod download; fi
      shell: bash

    - name: Run golangci-lint
      # Run inside the `trying` module so packages are found
      working-directory: trying
      run: |
        # Prefer golangci-lint on PATH, else try GOPATH install
        if command -v golangci-lint >/dev/null 2>&1; then
          golangci-lint run --timeout 5m ./...
        elif [ -x "$(go env GOPATH)/bin/golangci-lint" ]; then
          "$(go env GOPATH)/bin/golangci-lint" run --timeout 5m ./...
        else
          echo 'golangci-lint not found, installing v1.59.0 to GOPATH'
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh" | sh -s -- -b "$(go env GOPATH)/bin" v1.59.0
          "$(go env GOPATH)/bin/golangci-lint" run --timeout 5m ./...
        fi
      shell: bash