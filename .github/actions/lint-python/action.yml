name: 'Sijil Python Integration Tests'
description: 'Runs Python integration tests against real services.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio psycopg2-binary
      shell: bash
    - name: Wait for Postgres
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5432 && break
          sleep 1
        done
      shell: bash
    - name: Run Integration Tests
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        pytest tests/integration/ -v --junitxml=pytest-integration.xml
      shell: bash
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
    - name: Publish Integration Test Results
      uses: mikepenz/action-junit-report@v6
      if: always()
      with:
        report_paths: '**/pytest-integration.xml'
        check_name: 'Python Integration Tests'