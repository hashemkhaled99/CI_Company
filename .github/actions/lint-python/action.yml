name: 'Sijil Python Linter (Ruff)'
description: 'Runs Ruff for Python linting.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install Ruff
      run: |
        pip install ruff
      shell: bash
    - name: Run Ruff
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        ruff check .
      shell: bash
    - name: Run Ruff Format Check
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        ruff format --check .
      shell: bash