name: 'Sijil React Linter'
description: 'Runs Biome v2 for frontend code.'
runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
      with:
        node-version: '20'
    - uses: biomejs/setup-biome@c016c38f26f2c4a6eb3662679143614a39351d12 # v2
    - name: Run Biome CI
      run: |
        ROOT_FILE=$(find . -name "package.json" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        biome ci .
      shell: bash