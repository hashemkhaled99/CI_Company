name: 'Sijil Go Tests'
description: 'Runs Go tests with a Race Detector and 40% coverage gate.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-go@v5
      with: 
        go-version: '1.26.1'
        cache: true
    - name: Download modules
      run: |
        ROOT_FILE=$(find . -name "go.mod" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        if [ -f go.mod ]; then go mod download; fi
      shell: bash
    - name: Run Tests with Coverage Gate
      run: |
        ROOT_FILE=$(find . -name "go.mod" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        # 🚀 NEW: Added -race and -covermode=atomic
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -func=coverage.out > coverage_report.txt
        go tool cover -html=coverage.out -o coverage.html
        cat coverage_report.txt
        
        COVERAGE=$(grep total coverage_report.txt | awk '{print $3}' | sed 's/%//')
        echo "Current Coverage: $COVERAGE%"
        
        if (( $(echo "$COVERAGE < 40" | bc -l) )); then
          echo "❌ FAILED: Coverage is $COVERAGE%, which is below the 40% limit."
          exit 1
        fi
      shell: bash

    - name: Upload Go Coverage HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: go-coverage-report
        path: '**/coverage.html'
        retention-days: 7