name: 'Sijil Go Tests'
description: 'Runs Go tests with a Race Detector and 40% coverage gate.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-go@0aaccfd150d50cc02c983b546a3049f0c55835f6 # v5.4.0
      with: 
        go-version: '1.26.1'
        cache: true
    - name: Download modules
      run: |
        ROOT_FILE=$(find . -name "go.mod" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        if [ -f go.mod ]; then go mod download; fi
      shell: bash
    - name: Run Tests with Coverage Gate
      run: |
        ROOT_FILE=$(find . -name "go.mod" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -func=coverage.out > coverage_report.txt
        go tool cover -html=coverage.out -o coverage.html
        cat coverage_report.txt
        
        COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/{gsub(/%/,"",$3); print $3}')
        echo "Current Coverage: $COVERAGE%"
        
        if awk "BEGIN {exit !($COVERAGE < 40)}"; then
          echo "❌ FAILED: Coverage is $COVERAGE%, which is below the 40% limit."
          exit 1
        fi
      shell: bash
    - name: Upload Go Coverage HTML Report
      uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
      if: always()
      with:
        name: go-coverage-report
        path: '**/coverage.html'
        retention-days: 7