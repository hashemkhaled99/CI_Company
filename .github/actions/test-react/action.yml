name: 'Sijil React Tests'
description: 'Runs Vitest with a 40% coverage gate.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies
      run: |
        TARGET_DIR=$(dirname $(find . -name "package.json" | head -n 1))
        if [ -n "$TARGET_DIR" ]; then cd "$TARGET_DIR" || exit 1; fi
        npm install
      shell: bash
    - name: Run Vitest with Coverage
      run: |
        TARGET_DIR=$(dirname $(find . -name "package.json" | head -n 1))
        if [ -n "$TARGET_DIR" ]; then cd "$TARGET_DIR" || exit 1; fi
        # Runs vitest and fails if coverage is below 40%
        npx vitest run --coverage.enabled --coverage.thresholds.lines=40
      shell: bash