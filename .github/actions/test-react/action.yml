name: 'Sijil React Tests'
description: 'Runs Vitest with a 40% coverage gate.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Dependencies
      run: |
        ROOT_FILE=$(find . -name "package.json" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        npm install
      shell: bash
    - name: Run Vitest with Coverage
      run: |
        ROOT_FILE=$(find . -name "package.json" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        # Runs vitest and fails if coverage is below 40%
        npx vitest run --coverage.enabled --coverage.thresholds.lines=40 --coverage.reporter=html
      shell: bash

    - name: Upload React Coverage HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: react-coverage-report
        path: '**/coverage'
        retention-days: 7