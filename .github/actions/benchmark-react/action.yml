name: 'Sijil React Benchmark'
description: 'Runs Vitest benchmarks.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Run React Benchmarks
      run: |
        ROOT_FILE=$(find . -name "package.json" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        npm install
        npx vitest bench --run
      shell: bash
