name: 'Sijil Scan Secrets'
description: 'Runs Gitleaks to scan for hardcoded secrets.'
runs:
  using: "composite"
  steps:
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@ff98106e4430eddab5b9e1f50dd2db5271152f26 # v2.3.9
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        GITLEAKS_OPTS: "--verbose"