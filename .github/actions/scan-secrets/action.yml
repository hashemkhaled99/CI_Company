name: 'Sijil Scan Secrets'
description: 'Runs Gitleaks to scan for hardcoded secrets.'
runs:
  using: "composite"
  steps:
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2 # Using tag — verify SHA locally if needed
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        GITLEAKS_OPTS: "--verbose"