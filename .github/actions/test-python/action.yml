name: 'Sijil Python Tests'
description: 'Runs Pytest with a 40% coverage gate.'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov pytest-benchmark
      shell: bash
    - name: Run Pytest with Coverage Gate
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        # Gate set to 40%
        pytest . --cov=. --cov-fail-under=40 --cov-report=term-missing
      shell: bash