name: 'Sijil Python Tests'
description: 'Runs Pytest with a 40% coverage gate.'
inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.11'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
    - name: Install dependencies
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov pytest-benchmark
      shell: bash
    - name: Run Pytest with Coverage Gate
      run: |
        ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
        if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
        pytest . --cov=src --cov-fail-under=40 --cov-report=term-missing --cov-report=html:htmlcov --junitxml=pytest.xml
      shell: bash
    - name: Publish Test Results
      uses: mikepenz/action-junit-report@9379f0ccddcab154035d97e548f1de7ffac3f51b # v5.5.0
      if: always()
      with:
        report_paths: '**/pytest.xml'
    - name: Upload Python Coverage HTML Report
      uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
      if: always()
      with:
        name: python-coverage-report-py${{ inputs.python-version }}
        path: '**/htmlcov'
        retention-days: 7