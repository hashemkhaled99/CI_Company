name: Sijil-CI Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------------------------------------------
  # 1. DETECTION PHASE
  # -------------------------------------------------------------
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      golang: ${{ steps.filter.outputs.golang }}
      react: ${{ steps.filter.outputs.react }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'requirements.txt'
            golang:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - '.golangci.yml'
            react:
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.ts'
              - '**/*.tsx'
              - 'biome.json'
              - 'package.json'
            sql:
              - '**/*.sql'
              - '.sqlfluff'

  # -------------------------------------------------------------
  # 2. VALIDATION & SECURITY PHASE (Parallel execution)
  # -------------------------------------------------------------
  
  security-scan:
    name: 🔐 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  dependency-scan:
    name: 📦 Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'HIGH,CRITICAL'

  sast-scan:
    name: 🧠 Deep Security (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Semgrep CI
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/secrets
          generateSarif: "1"

  lint-python:
    name: Lint Python (Ruff)
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3

  lint-go:
    name: Lint Go (Strict)
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go (Targeting 1.26.1)
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Install golangci-lint from source
        # This compiles the linter using your 1.26.1 compiler
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        working-directory: trying
        run: |
          # Use the freshly compiled binary in the GOPATH
          $(go env GOPATH)/bin/golangci-lint run --timeout 10m

  lint-react:
    name: Lint React (Biome)
    needs: detect
    if: needs.detect.outputs.react == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: Run Biome Check
        run: biome ci .

  lint-sql:
    name: Lint SQL (SQLFluff)
    needs: detect
    if: needs.detect.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install & Run SQLFluff
        run: |
          pip install sqlfluff
          sqlfluff lint . --dialect postgres

  # -------------------------------------------------------------
  # 3. REPORTING PHASE
  # -------------------------------------------------------------
  report:
    name: CI Summary Report
    needs: [detect, security-scan, dependency-scan, sast-scan, lint-python, lint-go, lint-react, lint-sql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write Summary Table
        run: |
          echo "### 🚀 Sijil-CI Zero Legacy Report" >> $GITHUB_STEP_SUMMARY
          echo "| Sector | Detected/Run | Job Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------------|------------|" >> $GITHUB_STEP_SUMMARY
          
          # Security (Always runs)
          echo "| 🔐 Secrets (Gitleaks) | ✅ Yes | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependencies (Trivy) | ✅ Yes | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧠 SAST (Semgrep) | ✅ Yes | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          # Python
          if [ "${{ needs.detect.outputs.python }}" == "true" ]; then
            echo "| 🐍 Python (Ruff) | ✅ Yes | ${{ needs.lint-python.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🐍 Python (Ruff) | ❌ No | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Go
          if [ "${{ needs.detect.outputs.golang }}" == "true" ]; then
            echo "| 🐹 Go (Strict) | ✅ Yes | ${{ needs.lint-go.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🐹 Go (Strict) | ❌ No | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # React
          if [ "${{ needs.detect.outputs.react }}" == "true" ]; then
            echo "| ⚛️ React (Biome) | ✅ Yes | ${{ needs.lint-react.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚛️ React (Biome) | ❌ No | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

          # SQL
          if [ "${{ needs.detect.outputs.sql }}" == "true" ]; then
            echo "| 🗄️ SQL (Fluff) | ✅ Yes | ${{ needs.lint-sql.result }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🗄️ SQL (Fluff) | ❌ No | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi