name: Sijil-CI Engine

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python: ${{ steps.filter.outputs.python }}
      golang: ${{ steps.filter.outputs.golang }}
      react: ${{ steps.filter.outputs.react }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Path Filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            python: ['**/*.py', 'pyproject.toml', 'requirements.txt']
            golang: ['**/*.go', '**/go.mod', '**/go.sum', '.golangci.yml']
            react: ['**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', 'biome.json', 'package.json']
            sql: ['**/*.sql', '.sqlfluff']

  security-scan:
    name: 🔐 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: ./.github/actions/scan-secrets
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  dependency-scan:
    name: 📦 Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 — post-CVE-2026-33634 safe
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  sast-scan:
    name: 🧠 Deep Security (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: |
          semgrep ci \
            --config=p/default \
            --config=p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN || '' }}

  dependency-review:
    name: 🔍 Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0

  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        language: ['go', 'python', 'javascript']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15

  lint-python:
    name: Lint Python (Ruff)
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/lint-python

  test-python:
    name: Test Python + 40% Coverage
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/test-python
        with:
          python-version: ${{ matrix.python-version }}

  test-python-integration:
    name: Integration Tests (Python)
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/test-python-integration

  benchmark-python:
    name: Benchmark Python
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/benchmark-python

  lint-go:
    name: Lint Go (Strict)
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/lint-go

  test-go:
    name: Test Go + 40% Coverage
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/test-go

  benchmark-go:
    name: Benchmark Go
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/benchmark-go

  lint-react:
    name: Lint React (Biome)
    needs: detect
    if: needs.detect.outputs.react == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/lint-react

  test-react:
    name: Test React + 40% Coverage
    needs: detect
    if: needs.detect.outputs.react == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        node-version: ['20', '22']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/test-react
        with:
          node-version: ${{ matrix.node-version }}

  lint-sql:
    name: Lint SQL (SQLFluff)
    needs: detect
    if: needs.detect.outputs.sql == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/lint-sql

  build:
    name: 🏗️ Build Artifacts
    needs: [test-go, test-python, test-react]
    if: always() && needs.test-go.result == 'success' && needs.test-python.result == 'success' && needs.test-react.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build Go Binaries
        run: |
          ROOT_FILE=$(find . -name "go.mod" | head -n 1)
          if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
          go build -ldflags="-s -w" -o dist/go/ ./...
        shell: bash
      - name: Build React App
        run: |
          ROOT_FILE=$(find . -name "package.json" | head -n 1)
          if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
          npm ci
          npm run build
        shell: bash
      - name: Build Python Package
        run: |
          ROOT_FILE=$(find . -name "pyproject.toml" | head -n 1)
          if [ -n "$ROOT_FILE" ]; then cd "$(dirname "$ROOT_FILE")" || exit 1; fi
          pip install build
          python -m build
        shell: bash
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: production-build
          path: |
            dist/
            dist/go/
            dist/python/
          retention-days: 30

  report:
    name: CI Summary Report
    needs: [detect, security-scan, dependency-scan, sast-scan, codeql, dependency-review, lint-python, test-python, test-python-integration, lint-go, test-go, lint-react, test-react, lint-sql, benchmark-go, benchmark-python, build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Write Summary Table
        run: |
          echo "### 🚀 Sijil-CI Zero Legacy Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🔐 Security Posture" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks) | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies (Trivy) | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deep Scan (Semgrep) | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📊 Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "| Sector | Lint | Unit Test | Integration | Coverage | Speed | Build |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|-----------|-------------|----------|-------|-------|" >> $GITHUB_STEP_SUMMARY
          GO_L="${{ needs.lint-go.result }}"
          GO_T="${{ needs.test-go.result }}"
          GO_B="${{ needs.benchmark-go.result }}"
          GO_BUILD="${{ needs.build.result }}"
          echo "| 🐹 Go | ${GO_L:-Skipped} | ${GO_T:-Skipped} | N/A | 40% Min | ${GO_B:-Skipped} | ${GO_BUILD:-Skipped} |" >> $GITHUB_STEP_SUMMARY
          PY_L="${{ needs.lint-python.result }}"
          PY_T="${{ needs.test-python.result }}"
          PY_I="${{ needs.test-python-integration.result }}"
          PY_B="${{ needs.benchmark-python.result }}"
          echo "| 🐍 Python | ${PY_L:-Skipped} | ${PY_T:-Skipped} | ${PY_I:-Skipped} | 40% Min | ${PY_B:-Skipped} | ${GO_BUILD:-Skipped} |" >> $GITHUB_STEP_SUMMARY
          REACT_L="${{ needs.lint-react.result }}"
          REACT_T="${{ needs.test-react.result }}"
          echo "| ⚛️ React | ${REACT_L:-Skipped} | ${REACT_T:-Skipped} | N/A | 40% Min | N/A | ${GO_BUILD:-Skipped} |" >> $GITHUB_STEP_SUMMARY
          SQL_L="${{ needs.lint-sql.result }}"
          echo "| 🗄️ SQL | ${SQL_L:-Skipped} | N/A | N/A | N/A | N/A | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🏗️ Build Status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All quality gates passed. Build artifacts ready for deployment.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Quality gates failed. Review the table above for details.**" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Notify on Failure
        if: failure() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@485a9d42d3a730c3a993ebb0e60a887ccfee9e91 # v2.0.0
        with:
          payload: |
            {"text": "🚨 Sijil-CI failed on main: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}