name: Sijil-CI Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------------------------------------------
  # 1. DETECTION PHASE
  # -------------------------------------------------------------
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      golang: ${{ steps.filter.outputs.golang }}
      react: ${{ steps.filter.outputs.react }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python: ['**/*.py', 'pyproject.toml', 'requirements.txt']
            golang: ['**/*.go', '**/go.mod', '**/go.sum', '.golangci.yml']
            react: ['**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', 'biome.json', 'package.json']
            sql: ['**/*.sql', '.sqlfluff']

  # -------------------------------------------------------------
  # 2. VALIDATION & SECURITY PHASE (Parallel)
  # -------------------------------------------------------------
  
  security-scan:
    name: 🔐 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  dependency-scan:
    name: 📦 Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'

  sast-scan:
    name: 🧠 Deep Security (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: "p/default p/security-audit" }

  # --- Python Sector ---
  lint-python:
    name: Lint Python (Ruff)
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  test-python:
    name: Test Python + 40% Coverage
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Run Pytest with Coverage Gate
        run: |
          pip install pytest pytest-cov
          # The --cov-fail-under=40 is your hard gate
          pytest trying/ --cov=trying --cov-fail-under=40 --cov-report=term-missing

  # --- Go Sector ---
  lint-go:
    name: Lint Go (Strict)
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.1', cache: true }
      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run golangci-lint
        working-directory: trying
        run: $(go env GOPATH)/bin/golangci-lint run --timeout 10m

  test-go:
    name: Test Go + 40 % Coverage
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.1' }
      - name: Run Tests with Coverage Gate
        working-directory: trying
        run: |
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out > coverage_report.txt
          cat coverage_report.txt
          
          # Custom bash gate for Go 40% threshold
          COVERAGE=$(grep total coverage_report.txt | awk '{print $3}' | sed 's/%//')
          echo "Current Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "❌ FAILED: Coverage is $COVERAGE%, which is below the 40% limit."
            exit 1
          fi

  # --- Web & SQL Sectors ---
  lint-react:
    name: Lint React (Biome)
    needs: detect
    if: needs.detect.outputs.react == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
      - run: biome ci .

  lint-sql:
    name: Lint SQL (SQLFluff)
    needs: detect
    if: needs.detect.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          pip install sqlfluff
          sqlfluff lint . --dialect postgres

  # -------------------------------------------------------------
  # 3. REPORTING PHASE (Enhanced)
  # -------------------------------------------------------------
  report:
    name: CI Summary Report
    needs: [detect, security-scan, dependency-scan, sast-scan, lint-python, test-python, lint-go, test-go, lint-react, lint-sql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write Summary Table
        run: |
          echo "### 🚀 Sijil-CI Zero Legacy Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "| Sector | Lint Status | Logic Test | Coverage Gate |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|------------|---------------|" >> $GITHUB_STEP_SUMMARY
          
          # Go Status
          GO_L="${{ needs.lint-go.result }}"
          GO_T="${{ needs.test-go.result }}"
          echo "| 🐹 Go | ${GO_L:-Skipped} | ${GO_T:-Skipped} | 40% Min |" >> $GITHUB_STEP_SUMMARY

          # Python Status
          PY_L="${{ needs.lint-python.result }}"
          PY_T="${{ needs.test-python.result }}"
          echo "| 🐍 Python | ${PY_L:-Skipped} | ${PY_T:-Skipped} | 40% Min |" >> $GITHUB_STEP_SUMMARY

          # Frontend/SQL
          echo "| ⚛️ React | ${{ needs.lint-react.result }} | N/A | N/A |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ SQL | ${{ needs.lint-sql.result }} | N/A | N/A |" >> $GITHUB_STEP_SUMMARY

          # Security
          echo "#### 🔐 Security Posture" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deep Scan: ${{ needs.sast-scan.result }}" >> $GITHUB_STEP_SUMMARY