name: Sijil-CI Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 🚀 NEW: CONCURRENCY CONTROL
# Cancels outdated runs for the same Pull Request to save money and time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------
  # 1. DETECTION PHASE
  # -------------------------------------------------------------
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      golang: ${{ steps.filter.outputs.golang }}
      react: ${{ steps.filter.outputs.react }}
      react_tests: ${{ steps.filter.outputs.react_tests }}
      sql: ${{ steps.filter.outputs.sql }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python: ['**/*.py', 'pyproject.toml', 'requirements.txt']
            golang: ['**/*.go', '**/go.mod', '**/go.sum', '.golangci.yml']
            react: ['**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', 'biome.json']
            react_tests: ['package.json']
            sql: ['**/*.sql', '.sqlfluff']

  # -------------------------------------------------------------
  # 2. VALIDATION & SECURITY PHASE (Parallel)
  # -------------------------------------------------------------
  security-scan:
    name: 🔐 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  dependency-scan:
    name: 📦 Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'

  sast-scan:
    name: 🧠 Deep Security (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with: { config: "p/default p/security-audit" }

  # --- Python Sector ---
  lint-python:
    name: Lint Python (Ruff)
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint-python

  test-python:
    name: Test Python + 40% Coverage
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-python

  # --- Go Sector ---
  lint-go:
    name: Lint Go (Strict)
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - uses: ./.github/actions/lint-go

  test-go:
    name: Test Go + 40% Coverage
    needs: detect
    if: needs.detect.outputs.golang == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - uses: ./.github/actions/test-go

  # --- Web & SQL Sectors ---
  lint-react:
    name: Lint React (Biome)
    needs: detect
    if: needs.detect.outputs.react == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint-react

  lint-sql:
    name: Lint SQL (SQLFluff)
    needs: detect
    if: needs.detect.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/lint-sql

  # --- New React Test Job ---
  test-react:
    name: Test React + 40% Coverage
    needs: detect
    if: needs.detect.outputs.react_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-react

  # -------------------------------------------------------------
  # 3. REPORTING PHASE (Enhanced with PR Comments)
  # -------------------------------------------------------------
  report:
    name: CI Summary Report
    needs: [detect, security-scan, dependency-scan, sast-scan, lint-python, test-python, lint-go, test-go, lint-react, lint-sql, test-react]
    if: always()
    runs-on: ubuntu-latest
    # 🚨 NEW: Give the bot permission to write PR comments
    permissions:
      pull-requests: write
    steps:
      - name: Generate Report File
        run: |
          # Write the table to a temporary markdown file first
          echo "### 🚀 Sijil-CI Zero Legacy Quality Report" >> pr_report.md
          echo "| Sector | Lint Status | Logic Test | Coverage Gate |" >> pr_report.md
          echo "|--------|-------------|------------|---------------|" >> pr_report.md
          
          # Go Status
          GO_L="${{ needs.lint-go.result }}"
          GO_T="${{ needs.test-go.result }}"
          echo "| 🐹 Go | ${GO_L:-Skipped} | ${GO_T:-Skipped} | 40% Min |" >> pr_report.md

          # Python Status
          PY_L="${{ needs.lint-python.result }}"
          PY_T="${{ needs.test-python.result }}"
          echo "| 🐍 Python | ${PY_L:-Skipped} | ${PY_T:-Skipped} | 40% Min |" >> pr_report.md

          # Frontend/SQL
          echo "| ⚛️ React | ${{ needs.lint-react.result }} | ${{ needs.test-react.result }} | 40% Min |" >> pr_report.md
          echo "| 🗄️ SQL | ${{ needs.lint-sql.result }} | N/A | N/A |" >> pr_report.md

          # Security
          echo "#### 🔐 Security Posture" >> pr_report.md
          echo "- Secrets: ${{ needs.security-scan.result }}" >> pr_report.md
          echo "- Dependencies: ${{ needs.dependency-scan.result }}" >> pr_report.md
          echo "- Deep Scan: ${{ needs.sast-scan.result }}" >> pr_report.md

          # Push the file to the standard GitHub Actions summary tab
          cat pr_report.md >> $GITHUB_STEP_SUMMARY

      # 🚀 NEW: The Sticky Comment Bot
      - name: Post PR Comment
        # Only run this step if the pipeline was triggered by a Pull Request
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-summary # This ID tells the bot to overwrite its old comment
          path: pr_report.md # Feeds the table we just built to the bot