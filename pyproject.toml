[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "D", "S", "PLR"]
ignore = ["S101"]  # Allow assert in test files globally

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pytest.ini_options]
testpaths = ["trying"]
python_files = ["*_test.py", "test_*.py"]
