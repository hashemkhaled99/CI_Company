name: 'Sijil CI Linter'
description: 'Runs ultra-strict Ruff, Biome v2, Golangci-lint, and SQLFluff in parallel.'
branding:
  icon: 'shield'
  color: 'blue'

runs:
  using: "composite"
  steps:
    - name: Install & Run Ruff
      run: |
        pip install ruff
        ruff check . --config ${{ github.action_path }}/pyproject.toml
      shell: bash

    - name: Run golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        $(go env GOPATH)/bin/golangci-lint run --config=${{ github.action_path }}/.golangci.yml
      shell: bash

    - name: Install & Run Biome
      run: |
        npm install -g @biomejs/biome
        biome ci --config-path=${{ github.action_path }} .
      shell: bash

    - name: Install & Run SQLFluff
      run: |
        pip install sqlfluff
        sqlfluff lint . --config ${{ github.action_path }}/.sqlfluff
      shell: bash